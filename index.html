<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rps.css">
  </head>
  <body>
    <p class="game-header">Rock Paper Scissors</p>
    <button class="action-btn js-rock-btn">
      <img src="images/rock-emoji.png" class="choice-image">
    </button>

    <button class="action-btn js-paper-btn">
      <img src="images/paper-emoji.png" class="choice-image">
    </button>

    <button class="action-btn js-scissors-btn">
      <img src="images/scissors-emoji.png" class="choice-image">
    </button>

    <p class="js-round-result battle-status"></p>
    <p class="js-battle-moves"></p>
    <p class="js-stats-board stats-container"></p>

    <button onclick="
      gameStats.wins = 0;
      gameStats.losses = 0;
      gameStats.ties = 0;
      localStorage.removeItem('gameStats');
      refreshScoreDisplay();
    " class="clear-history-btn js-reset-score-button">Reset Score</button>

    <button class="bot-play-btn" onclick="
      toggleAutoMode();
    ">Auto Play</button>
    
    <script src="rps-game.js"></script>
  </body>
</html>
